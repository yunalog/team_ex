<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임회사 키우기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="top-header">
      <div>
        <strong>신입사원</strong>
        <p id="stageText">Project 1-1</p>
      </div>
      <button id="offlineBtn">비접속 보상</button>
    </header>

    <main id="workPage" class="page active">
      <section class="summary-panel">
        <div>
          <span>업무력</span>
          <strong id="powerText">10</strong>
        </div>
        <div>
          <span>월급</span>
          <strong id="goldText">0</strong>
        </div>
        <div>
          <span>체력</span>
          <strong id="hpText">100</strong>
        </div>
      </section>

      <section class="battle-card">
        <div class="office-props">
          <span>🪴</span>
          <span>💻</span>
          <span>📋</span>
        </div>

        <div class="battle-lane">
          <div id="hero" class="character hero">👩‍💼</div>
          <div id="enemy" class="character enemy">🐞</div>
        </div>
      </section>

      <section class="task-panel">
        <div class="task-title-row">
          <strong id="enemyName">버그 리포트</strong>
          <span id="timerText"></span>
        </div>

        <div class="hp-bar">
          <div id="enemyHpBar"></div>
        </div>

        <p id="enemyHpText">100 / 100</p>
        <div id="log">업무 처리 시작!</div>
      </section>

      <section class="gather-panel">
        <button id="gatherBtn">📦 사무실 탐색</button>
        <p>노트북 · 후드집업 · 사원증 · 커피 · 박카스 획득</p>
      </section>
    </main>

    <main id="upgradePage" class="page">
      <h2>강화</h2>

      <section class="card">
        <h3>장착 아이템</h3>
        <p>업무장비: <span id="weaponText">없음</span></p>
        <p>복장: <span id="armorText">없음</span></p>
        <p>소지품: <span id="accessoryText">없음</span></p>
      </section>

      <section class="card">
        <h3>버프 아이템</h3>
        <p id="buffText">없음</p>
      </section>

      <section class="card muted">
        팀원 뽑기 / 스쿼드 구성 / 팀원 수집은 다음 단계에서 추가
      </section>
    </main>

    <main id="companyPage" class="page">
      <h2>회사</h2>

      <section class="card company-card">
        <div class="company-icon">🏢</div>
        <h3>작은 게임회사</h3>
        <p>아직은 작은 사무실입니다. 이후 팀원을 뽑고 회사를 확장할 수 있습니다.</p>
      </section>
    </main>

    <main id="settingPage" class="page">
      <h2>설정</h2>

      <section class="card row-card">
        <span>사운드</span>
        <button id="soundBtn">ON</button>
      </section>

      <button id="resetBtn" class="danger">데이터 초기화</button>
    </main>

    <nav class="bottom-nav">
      <button class="tab active" data-page="workPage">업무</button>
      <button class="tab" data-page="upgradePage">강화</button>
      <button class="tab" data-page="companyPage">회사</button>
      <button class="tab" data-page="settingPage">설정</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle"></h2>
      <div id="modalBody"></div>
      <div id="modalActions"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
